<html>

<head>


    <meta charset=utf-8 />
    <script src="Chart.js"></script>
    
</head>

<body>
    <header>
        <input id="checkbox_interaccion_grafico"type="checkbox" />
        <label for="checkbox_interaccion_grafico">Interactuar grafico y query</label>
    </header>
    <div id="dashboard">
        <div class="board">
            <canvas id="myChart" style="width:100%;max-width:700px"></canvas>
        </div>
        <div class="board">
            <input type="search" size="30" id="search_input" placeholder="Titulo Empleo"/>
            <button id="search_button">Buscar</button>
            <div id="results"></div>
        </div>
    </div>
    
    
    <script type="text/javascript" src="panel_ofertas.js" charset="utf-8"></script>
    <style>
        #dashboard{
            display: flex;
        }
        .board{
            width: 50%;
            max-height: 100vh;
        }


        #results {
           height: 100%; /* Adjust the height as needed */
            overflow: auto;
        }
        .job-card {
            border: 1px solid #ccc;
            border-radius: 4px;
            padding: 10px;
            margin-bottom: 10px;
            }

            .job-title {
            font-weight: bold;
            font-size: 16px;
            margin-bottom: 5px;
            }

            .company,
            .location,
            .posting-date {
            font-size: 14px;
            margin-bottom: 3px;
            }
    </style>
</body>
</html>
